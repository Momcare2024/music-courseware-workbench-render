services:
  - type: web
    name: music-courseware-workbench
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: WORKBENCH_DATA_DIR
        value: /opt/render/project/src/data
      - key: ALLOW_WEB_CONFIG
        value: "false"
      - key: ARK_BASE_URL
        value: https://ark.cn-beijing.volces.com/api/v3
      - key: ARK_IMAGE_MODEL
        value: doubao-seedream-4-0-250828
      - key: ARK_API_KEY
        sync: false
      - key: ACCESS_CODE
        sync: false
      - key: VECTORENGINE_API_KEY
        sync: false
      - key: VECTORENGINE_BASE_URL
        value: https://api.vectorengine.ai/v1
      - key: TEXT_MODEL
        value: claude-sonnet-4-5
